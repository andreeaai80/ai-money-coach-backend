<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>AI Money Coach</title>
</head>

<body>
  <h1>AI Money Coach 💰</h1>

  <input id="input" placeholder="Ask about money..." />
  <button id="sendBtn">Send</button>

  <p id="response"></p>

  <script>
    // ✅ 1) UserId persistent (în browser). Pentru “între dispozitive” real, vei lega mai târziu de login.
    function getUserId() {
      let id = localStorage.getItem("user_id");
      if (!id) {
        if (window.crypto && crypto.randomUUID) {
          id = crypto.randomUUID();
        } else {
          // fallback simplu dacă randomUUID nu există
          id = "user_" + Date.now() + "_" + Math.random().toString(16).slice(2);
        }
        localStorage.setItem("user_id", id);
      }
      return id;
    }

    async function send() {
      const inputEl = document.getElementById("input");
      const responseEl = document.getElementById("response");

      const message = (inputEl.value || "").trim();
      if (!message) {
        responseEl.innerText = "Please type a question 🙂";
        return;
      }

      responseEl.innerText = "Thinking...";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          // ✅ 2) trimitem și userId către server ca să salveze conversația pe user
          body: JSON.stringify({ message, userId: getUserId() })
        });

        const rawText = await res.text();

        let data = {};
        try {
          data = JSON.parse(rawText);
        } catch (e) {
          // dacă nu e JSON, rămâne text
        }

        if (!res.ok) {
          const errMsg = (data && data.error) || rawText || "Unknown server error";
          responseEl.innerText = `Server error (${res.status}): ${errMsg}`;
          return;
        }

        const reply =
          (data && data.reply) ||
          (data && data.output_text) ||
          (data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) ||
          rawText;

        responseEl.innerText = (reply || "").trim() || "No response from server";
      } catch (error) {
        console.log(error);
        responseEl.innerText = "Network error: " + (error.message || "Unknown error");
      }
    }

    document.getElementById("sendBtn").addEventListener("click", send);

    document.getElementById("input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") send();
    });
  </script>
</body>
</html>
